<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lifebook - Payment Successful</title>
  
  <style>
    :root{--cream:#fdf6ec;--cream-deep:#f5e9d4;--parchment:#ede0c8;--gold:#c8922a;--gold-light:#e8b84b;--gold-pale:#f5d98a;--brown:#5c3d1e;--text:#3a2810;--text-muted:#7a6048;--white:#ffffff;--shadow-warm:0 8px 40px rgba(100,60,20,0.12);--shadow-gold:0 4px 24px rgba(200,146,42,0.22)}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Assistant',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
    nav{position:sticky;top:0;z-index:100;background:rgba(253,246,236,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--parchment);padding:0 5vw;height:68px;display:flex;align-items:center;justify-content:center}
    .nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none}
    .nav-brand-icon{font-size:28px;filter:drop-shadow(0 2px 6px rgba(200,146,42,0.5))}
    .nav-brand-name{font-family:'Assistant',sans-serif;font-size:24px;color:var(--gold);letter-spacing:0.5px}
    .shell{width:min(680px,94vw);margin:0 auto;padding:60px 0 80px;flex:1;display:flex;flex-direction:column;align-items:center;text-align:center}

    /* SUCCESS ICON */
    .success-icon{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--gold-light),var(--gold));display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 24px;box-shadow:var(--shadow-gold)}

    .page-title{font-family:'Assistant',sans-serif;font-size:clamp(28px,5vw,46px);color:var(--brown);line-height:1.1;margin-bottom:10px}
    .page-sub{font-size:17px;color:var(--text-muted);line-height:1.7;margin-bottom:36px;max-width:480px}

    /* CARD */
    .card{background:var(--white);border-radius:24px;padding:28px;box-shadow:var(--shadow-warm);border:1px solid var(--parchment);position:relative;overflow:hidden;width:100%;margin-bottom:16px}
    .card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold-light),var(--gold))}

    .book-preview{display:flex;align-items:center;gap:18px;margin-bottom:20px}
    .mini-cover{width:70px;height:97px;border-radius:8px;overflow:hidden;border:2px solid rgba(200,146,42,0.3);background:var(--cream-deep);flex-shrink:0}
    .mini-cover img{width:100%;height:100%;object-fit:cover;display:none}
    .book-info{text-align:left}
    .book-title{font-family:'Assistant',sans-serif;font-size:18px;color:var(--brown);margin-bottom:4px}
    .book-meta{font-size:13px;color:var(--text-muted)}

    .btn-primary{background:linear-gradient(135deg,var(--gold-light),var(--gold));color:var(--white);border:none;border-radius:50px;padding:16px 36px;font-size:17px;font-weight:700;cursor:pointer;box-shadow:var(--shadow-gold);transition:all 0.25s;font-family:'Assistant',sans-serif;width:100%;margin-bottom:10px}
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 36px rgba(200,146,42,0.45)}
    .btn-secondary{background:var(--white);color:var(--brown);border:1.5px solid var(--parchment);border-radius:50px;padding:14px 28px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Assistant',sans-serif;transition:all 0.2s;width:100%}
    .btn-secondary:hover{border-color:var(--gold-light)}

    .status{font-size:14px;color:var(--text-muted);margin-top:12px}

    @media(max-width:640px){.shell{padding:40px 14px 60px}}
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
  <script src="js/i18n.js"></script>
  <!-- Google Analytics GA4 -->

</head>
<body>
<nav>
  <a class="nav-brand" href="index.html">
    <img src="assets/branding/lifebook-logo.webp" alt="Lifebook" style="height:54px;width:auto;display:block"/>
  </a>
  <button id="langToggleBtn" onclick="i18nToggle()" style="background:none;border:1.5px solid #c8922a;color:#c8922a;border-radius:50px;padding:6px 16px;font-family:'Assistant',sans-serif;font-size:13px;font-weight:700;cursor:pointer;">English</button>
</nav>
<main class="shell">
  <div class="success-icon">✓</div>
  <h1 class="page-title" data-i18n="successTitle">Payment successful!</h1>
  <p class="page-sub" data-i18n="successSubtitle">Your personalized storybook is being prepared. You'll be able to read and download it in just a moment.</p>

  <div class="card">
    <div class="book-preview">
      <div class="mini-cover">
        <img id="coverImg" alt="Cover" onload="this.style.display='block'"/>
      </div>
      <div class="book-info">
        <div class="book-title" id="bookTitle" data-i18n="yourMagicalAdventure">Your Magical Adventure</div>
        <div class="book-meta" id="bookMeta" data-i18n="personalizedStorybook">Personalized storybook</div>
      </div>
    </div>
    <button class="btn-primary" id="openBookBtn" data-i18n="successCta">📖 Open My Book</button>
    <button class="btn-secondary" id="goHomeBtn" data-i18n="backToHome">Back to home</button>
    <div class="status" id="statusMsg" data-i18n="verifyingOrder">Verifying your order...</div>
    <div id="resendWrap" style="display:none;margin-top:8px;">
      <button id="resendEmailBtn" style="background:none;border:none;color:var(--gold);font-size:13px;cursor:pointer;text-decoration:underline;font-family:'Assistant',sans-serif;" data-i18n="resendEmailBtn">
        📬 Resend book link to my email
      </button>
    </div>
  </div>
</main>
<script type="module">
const API    = window.location.origin;
const bookId = new URLSearchParams(window.location.search).get("bookId");

const openBtn    = document.getElementById("openBookBtn");
const homeBtn    = document.getElementById("goHomeBtn");
const statusEl   = document.getElementById("statusMsg");
const coverImg   = document.getElementById("coverImg");
const titleEl    = document.getElementById("bookTitle");
const metaEl     = document.getElementById("bookMeta");
const resendBtn  = document.getElementById("resendEmailBtn");
const resendWrap = document.getElementById("resendWrap");

if (!bookId) { window.location.href = "wizard.html"; }

// Button starts disabled — enabled only once purchaseUnlocked confirmed (or after timeout)
openBtn.disabled      = true;
openBtn.style.opacity = "0.6";
openBtn.style.cursor  = "not-allowed";
openBtn.textContent   = "⏳ " + (typeof i18nT === 'function' ? i18nT('confirmingPayment') : "Confirming payment...");

homeBtn.onclick = () => { window.location.href = "index.html"; };

function goToBook() {
  window.location.href = "delivery.html?bookId=" + encodeURIComponent(bookId);
}

function enableOpenBtn() {
  openBtn.disabled      = false;
  openBtn.style.opacity = "1";
  openBtn.style.cursor  = "pointer";
  openBtn.textContent   = typeof i18nT === 'function' ? i18nT('successCta') : "📖 Open My Book";
  openBtn.onclick       = goToBook;
}

// Resend email button
if (resendBtn && bookId) {
  resendBtn.addEventListener("click", async function() {
    resendBtn.textContent = typeof i18nT === 'function' ? i18nT('statusSaving') : "Sending...";
    resendBtn.disabled = true;
    try {
      const r = await fetch(API + "/api/books/" + bookId + "/resend-email", { method: "POST" });
      const d = await r.json();
      resendBtn.textContent = d.ok ? (typeof i18nT === 'function' ? i18nT('sentCheckInbox') : "✅ Sent! Check your inbox") : "❌ " + (d.error || (typeof i18nT === 'function' ? i18nT('cropError') : "Try again"));
    } catch(e) {
      resendBtn.textContent = typeof i18nT === 'function' ? i18nT('networkError') : "❌ Network error";
    }
  });
}

async function loadBook() {
  const r = await fetch(API + "/api/books/" + bookId);
  const d = await r.json();
  return d.book;
}

async function init() {
  try {
    statusEl.textContent = typeof i18nT === 'function' ? i18nT('confirmingPayment') : "Confirming your payment...";

    // If redirected from Gumroad, call /unlock immediately (webhook may not have fired yet)
    const source = new URLSearchParams(window.location.search).get("source");
    if (source === "gumroad" && bookId) {
      try {
        console.log("[success] source=gumroad — calling /unlock for bookId:", bookId);
        await fetch(API + "/api/books/" + bookId + "/unlock", { method: "POST" });
      } catch (unlockErr) {
        console.warn("[success] /unlock call failed:", unlockErr.message);
      }
    }

    // Poll up to 30×2s = 60 seconds for purchaseUnlocked (waits for webhook)
    let book     = null;
    let unlocked = false;
    for (let i = 0; i < 30; i++) {
      book = await loadBook();

      // Update UI with whatever data has arrived on this poll — title/cover may arrive
      // before purchaseUnlocked (story is written during generation, not after payment)
      if (book?.generatedBook?.title) {
        titleEl.textContent = book.generatedBook.title;
      }
      if (book?.coverImage) {
        coverImg.src = book.coverImage;
      }
      if (book?.childName !== undefined) {
        metaEl.textContent = (book.childName || "") + " · " + (book.generatedBook?.pages?.length || 0) + (typeof i18nT === 'function' ? i18nT('pageCountSuffix') : " pages");
      }

      if (book && book.purchaseUnlocked) { unlocked = true; break; }
      await new Promise(r => setTimeout(r, 2000));
      statusEl.textContent = typeof i18nT === 'function' ? i18nT('confirmingPaymentCount').replace('{i}', i + 1) : "Confirming payment... (" + (i + 1) + "/30)";
    }

    if (!book) {
      statusEl.textContent = typeof i18nT === 'function' ? i18nT('couldNotLoadBook') : "Could not load book — please contact support.";
      enableOpenBtn(); // let them try anyway
      return;
    }

    // Final render pass — ensures UI reflects last fetched state
    if (book.generatedBook?.title) { titleEl.textContent = book.generatedBook.title; }
    if (book.coverImage) { coverImg.src = book.coverImage; }
    metaEl.textContent = (book.childName || "") + " · " + (book.generatedBook?.pages?.length || 0) + (typeof i18nT === 'function' ? i18nT('pageCountSuffix') : " pages");

    // Enable the button — always delivery.html
    enableOpenBtn();

    if (unlocked) {
      statusEl.textContent = typeof i18nT === 'function' ? i18nT('paymentConfirmedReady') : "✅ Payment confirmed — your book is ready!";
      statusEl.style.color = "#2d7a2d";
      if (resendWrap) resendWrap.style.display = "block";
      // Auto-redirect after 2s
      setTimeout(goToBook, 2000);
    } else {
      // Webhook didn't fire in 60s — redirect anyway; delivery.html will handle unlocked state
      statusEl.textContent = typeof i18nT === 'function' ? i18nT('paymentConfirmedOpening') : "Payment confirmed — opening your book...";
      statusEl.style.color = "#c8922a";
      setTimeout(goToBook, 2500);
    }

  } catch(err) {
    console.error("success page error:", err);
    statusEl.textContent = "Error: " + err.message;
    enableOpenBtn(); // always let them try
  }
}

init();
</script>
<script src="accessibility.js"></script>
</body>
</html>
